<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notation</title>

<script type="application/json" id="widgetMeta">
{
  "name": "Notation",
  "version": "1.0",
  "author": "Korvo",
  "coverImage": "https://eblo.id/uploads/q3ru2aL/%D0%97%D0%BD%D1%96%D0%BC%D0%BE%D0%BA%20%D0%B5%D0%BA%D1%80%D0%B0%D0%BD%D0%B0%20(184).opt.webp",
  "tags": ["Notes","Light"],
  "description": "Notation — A clean, minimal notes app with a classic desktop aesthetic. Split-panel layout with a searchable note list and distraction-free editor. Create, edit, and delete notes instantly — all stored locally in your browser.",
  "source": "https://github.com/Cheeell/Nodule-Themes/blob/main/contents/widgets/notes.html",
  "releaseDate": "2026-02-15",
  "homepage": "https://example.com",
  "license": "MIT",
}
</script>

  
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lucida+Grande&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
  }

  :root {
    --bg-window: #ececec;
    --sidebar-bg: #d0d0d0;
    --sidebar-selected: #3e76c8;
    --sidebar-selected-unfocused: #a0a0a0;
    --border-color: #a0a0a0;
    --text-primary: #1a1a1a;
    --text-secondary: #555;
    --text-meta: #888;
    --editor-bg: #ffffff;
    --scrollbar-track: #e0e0e0;
    --scrollbar-thumb: #b0b0b0;
    --font: "Lucida Grande", "Geneva", "Helvetica Neue", Helvetica, Arial, sans-serif;
    --titlebar-h: 36px;
    --toolbar-h: 32px;
  }

  body {
    background: #7a7a7a;
    display: flex;
    align-items: stretch;
    justify-content: stretch;
    height: 100vh;
    width: 100vw;
    font-family: var(--font);
  }

  /* ── Window chrome ── */
  .window {
    width: 100vw;
    height: 100vh;
    border-radius: 0;
    overflow: hidden;
    box-shadow: none;
    display: flex;
    flex-direction: column;
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
  }

  /* Title bar */
  .titlebar {
    height: var(--titlebar-h);
    background: linear-gradient(180deg, #e8e8e8 0%, #d0d0d0 100%);
    border-bottom: 1px solid #9e9e9e;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 8px;
    flex-shrink: 0;
    position: relative;
  }

  .titlebar-title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    font-weight: bold;
    color: #3a3a3a;
    text-shadow: 0 1px 0 rgba(255,255,255,.6);
    pointer-events: none;
  }

  /* Traffic lights */
  .traffic-lights { display: flex; gap: 6px; align-items: center; }
  .tl {
    width: 13px; height: 13px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,.2);
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
  }
  .tl.close  { background: radial-gradient(circle at 35% 35%, #ff8080, #e04040); }
  .tl.min    { background: radial-gradient(circle at 35% 35%, #ffe080, #e0b020); }
  .tl.max    { background: radial-gradient(circle at 35% 35%, #60e060, #30a030); }
  .tl:hover::after {
    content: '';
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: rgba(0,0,0,.18);
  }

  /* Toolbar (search bar) */
  .toolbar {
    height: var(--toolbar-h);
    background: linear-gradient(180deg, #d8d8d8 0%, #c8c8c8 100%);
    border-bottom: 1px solid #9a9a9a;
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 6px;
    flex-shrink: 0;
  }

  .search-wrap {
    flex: 1;
    position: relative;
  }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 7px;
    top: 50%;
    transform: translateY(-50%);
    color: #888;
    font-size: 13px;
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    height: 20px;
    border-radius: 10px;
    border: 1px solid #999;
    background: linear-gradient(180deg, #e8e8e8, #f2f2f2);
    box-shadow: inset 0 1px 2px rgba(0,0,0,.15);
    padding: 0 8px 0 24px;
    font-family: var(--font);
    font-size: 11px;
    color: var(--text-primary);
    outline: none;
  }
  .search-input:focus {
    border-color: #5a8fdb;
    box-shadow: inset 0 1px 2px rgba(0,0,0,.15), 0 0 0 2px rgba(90,143,219,.35);
  }

  .new-btn {
    width: 22px; height: 20px;
    border-radius: 4px;
    border: 1px solid #999;
    background: linear-gradient(180deg, #e8e8e8, #d0d0d0);
    font-size: 15px;
    line-height: 1;
    color: #444;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 1px 0 rgba(255,255,255,.6) inset;
  }
  .new-btn:hover { background: linear-gradient(180deg, #f0f0f0, #dcdcdc); }
  .new-btn:active { background: linear-gradient(180deg, #c8c8c8, #d8d8d8); }

  /* Main layout */
  .body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: linear-gradient(180deg, #d8d8d8 0%, #c8c8c8 100%);
    border-right: 1px solid #9a9a9a;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .note-list {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .note-list::-webkit-scrollbar { width: 8px; }
  .note-list::-webkit-scrollbar-track { background: #cccccc; }
  .note-list::-webkit-scrollbar-thumb { background: #a0a0a0; border-radius: 4px; }

  .note-item {
    padding: 8px 10px 6px;
    border-bottom: 1px solid #b8b8b8;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .note-item::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: rgba(255,255,255,.4);
  }
  .note-item:hover { background: rgba(0,0,0,.06); }
  .note-item.active {
    background: linear-gradient(180deg, #4a84d8, #3262b8);
    border-bottom-color: #2a52a0;
  }
  .note-item.active::after { background: rgba(255,255,255,.1); }

  .note-title {
    font-size: 12px;
    font-weight: bold;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 1px 0 rgba(255,255,255,.4);
    margin-bottom: 2px;
  }
  .note-item.active .note-title { color: #fff; text-shadow: 0 1px 1px rgba(0,0,0,.3); }

  .note-date {
    font-size: 10px;
    color: var(--text-meta);
    margin-bottom: 3px;
  }
  .note-item.active .note-date { color: rgba(255,255,255,.75); }

  .note-preview {
    font-size: 10.5px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  .note-item.active .note-preview { color: rgba(255,255,255,.85); }

  /* ── Editor ── */
  .editor-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #ffffff;
    overflow: hidden;
  }

  .editor-meta {
    padding: 8px 14px 0;
    border-bottom: 1px solid #e0e0e0;
    background: #fafafa;
    flex-shrink: 0;
  }

  .editor-title-input {
    width: 100%;
    font-family: var(--font);
    font-size: 14px;
    font-weight: bold;
    color: #1a1a1a;
    border: none;
    background: transparent;
    outline: none;
    padding: 0 0 6px;
  }

  .editor-date-display {
    font-size: 10px;
    color: #888;
    padding-bottom: 5px;
  }

  .editor-content {
    flex: 1;
    padding: 12px 14px;
    font-family: var(--font);
    font-size: 12.5px;
    line-height: 1.65;
    color: #2a2a2a;
    border: none;
    outline: none;
    resize: none;
    background: #ffffff;
    overflow-y: auto;
  }

  .editor-content::-webkit-scrollbar { width: 8px; }
  .editor-content::-webkit-scrollbar-track { background: #f0f0f0; }
  .editor-content::-webkit-scrollbar-thumb { background: #c0c0c0; border-radius: 4px; }

  /* Status bar */
  .statusbar {
    height: 18px;
    background: linear-gradient(180deg, #d4d4d4, #c4c4c4);
    border-top: 1px solid #a0a0a0;
    display: flex;
    align-items: center;
    padding: 0 10px;
    font-size: 10px;
    color: #666;
    flex-shrink: 0;
    gap: 8px;
  }
  .statusbar span { text-shadow: 0 1px 0 rgba(255,255,255,.5); }
  .statusbar .sep { color: #aaa; }
  .statusbar .right { margin-left: auto; }

  /* Delete button on note items */
  .note-item .delete-btn {
    position: absolute;
    right: 7px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,.25);
    background: radial-gradient(circle at 35% 35%, #ff8080, #c84040);
    color: #fff;
    font-size: 9px;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: 0 1px 2px rgba(0,0,0,.25);
    font-weight: bold;
    line-height: 1;
  }
  .note-item:hover .delete-btn { display: flex; }
  .note-item.active .delete-btn {
    border-color: rgba(255,255,255,.3);
    background: radial-gradient(circle at 35% 35%, rgba(255,255,255,.35), rgba(255,255,255,.15));
    color: #fff;
  }
  .note-item .delete-btn:hover { filter: brightness(1.15); }
  .note-item .delete-btn:active { filter: brightness(.85); }

  /* Context menu */
  .ctx-menu {
    position: fixed;
    z-index: 9999;
    background: linear-gradient(180deg, #f0f0f0, #e4e4e4);
    border: 1px solid #a0a0a0;
    border-radius: 5px;
    box-shadow: 0 4px 16px rgba(0,0,0,.35), 0 1px 0 rgba(255,255,255,.6) inset;
    padding: 3px 0;
    min-width: 150px;
    font-size: 12px;
    font-family: var(--font);
  }
  .ctx-item {
    padding: 4px 18px;
    color: #1a1a1a;
    cursor: default;
    white-space: nowrap;
  }
  .ctx-item:hover { background: var(--sidebar-selected); color: #fff; }
  .ctx-item.danger:hover { background: #b02020; color: #fff; }
  .ctx-sep { height: 1px; background: #b8b8b8; margin: 3px 0; }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #bbb;
    font-size: 12px;
    gap: 8px;
  }
  .empty-state .icon { font-size: 40px; opacity: .3; }

  /* Resize handle hint */
  .resize-handle {
    width: 4px;
    cursor: col-resize;
    background: transparent;
    position: absolute;
    top: var(--titlebar-h);
    bottom: 18px;
    left: 220px;
    z-index: 10;
  }
</style>
</head>
<body>

<div class="window" id="window">

  <!-- Title bar -->
  <div class="titlebar" id="titlebar">
    <div class="titlebar-title" id="windowTitle">Notation</div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="new-btn" title="New Note" id="newBtn">+</button>
    <div class="search-wrap">
      <input class="search-input" type="text" placeholder="Search" id="searchInput">
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="note-list" id="noteList"></div>
    </div>

    <!-- Editor -->
    <div class="editor-pane" id="editorPane">
      <div class="empty-state" id="emptyState">
        <div>No note selected</div>
      </div>
      <div id="editorInner" style="display:none; flex:1; flex-direction:column; overflow:hidden; display:none;">
        <div class="editor-meta">
          <input class="editor-title-input" id="editorTitle" type="text" placeholder="Title">
          <div class="editor-date-display" id="editorDate"></div>
        </div>
        <textarea class="editor-content" id="editorContent" placeholder="Start writing…"></textarea>
      </div>
    </div>

  </div>

  <!-- Status bar -->
  <div class="statusbar">
    <span id="noteCount">0 notes</span>
    <span class="sep">·</span>
    <span id="wordCount">0 words</span>
    <span class="right" id="statusDate"></span>
  </div>

</div>

<script>
// ── Safe storage (falls back to in-memory if localStorage is blocked) ──
const store = (() => {
  let mem = {};
  try {
    localStorage.setItem('__test__', '1');
    localStorage.removeItem('__test__');
    return {
      get: k => { try { return localStorage.getItem(k); } catch(e) { return mem[k] ?? null; } },
      set: (k, v) => { try { localStorage.setItem(k, v); } catch(e) { mem[k] = v; } }
    };
  } catch(e) {
    return {
      get: k => mem[k] ?? null,
      set: (k, v) => { mem[k] = v; }
    };
  }
})();

// ── State ──
let notes = [];
let activeId = null;
let filterText = '';

try { notes = JSON.parse(store.get('notation_notes') || '[]'); } catch(e) { notes = []; }



// ── Helpers ──
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

function fmtDate(d) {
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  if (isToday) return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  const isThisYear = d.getFullYear() === now.getFullYear();
  if (isThisYear) return d.toLocaleDateString([], {month:'short', day:'numeric'});
  return d.toLocaleDateString([], {month:'numeric', day:'numeric', year:'2-digit'});
}

function save() { store.set('notation_notes', JSON.stringify(notes)); }

function wordCount(text) {
  return text.trim() ? text.trim().split(/\s+/).length : 0;
}

// ── Render ──
function render() {
  const list = document.getElementById('noteList');
  const q = filterText.toLowerCase();
  const visible = q
    ? notes.filter(n => n.title.toLowerCase().includes(q) || n.body.toLowerCase().includes(q))
    : notes;

  list.innerHTML = '';
  visible.sort((a, b) => b.ts - a.ts).forEach(note => {
    const div = document.createElement('div');
    div.className = 'note-item' + (note.id === activeId ? ' active' : '');
    div.dataset.id = note.id;
    const previewText = note.body.split('\n').find(l => l.trim()) || '';
    div.innerHTML = `
      <div class="note-title">${esc(note.title || 'Untitled')}</div>
      <div class="note-date">${note.date}</div>
      <div class="note-preview">${esc(previewText.slice(0, 60))}</div>
      <div class="delete-btn" title="Delete note">✕</div>
    `;
    div.addEventListener('click', (e) => {
      if (e.target.classList.contains('delete-btn')) return;
      selectNote(note.id);
    });
    div.querySelector('.delete-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteNote(note.id);
    });
    div.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      selectNote(note.id);
      showContextMenu(e.clientX, e.clientY, note.id);
    });
    list.appendChild(div);
  });

  // Status bar
  document.getElementById('noteCount').textContent = notes.length + ' note' + (notes.length !== 1 ? 's' : '');
  document.getElementById('statusDate').textContent = new Date().toLocaleDateString([], {weekday:'short', month:'short', day:'numeric', year:'numeric'});

  updateEditor();
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updateEditor() {
  const note = notes.find(n => n.id === activeId);
  const empty = document.getElementById('emptyState');
  const inner = document.getElementById('editorInner');

  if (!note) {
    empty.style.display = 'flex';
    inner.style.display = 'none';
    document.getElementById('wordCount').textContent = '0 words';
    document.getElementById('windowTitle').textContent = 'Notation';
    return;
  }

  empty.style.display = 'none';
  inner.style.display = 'flex';
  document.getElementById('editorTitle').value = note.title;
  document.getElementById('editorDate').textContent = new Date(note.ts).toLocaleString([], {weekday:'long', month:'long', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit'});
  document.getElementById('editorContent').value = note.body;
  document.getElementById('wordCount').textContent = wordCount(note.body) + ' words';
  document.getElementById('windowTitle').textContent = note.title || 'Untitled';
}

// ── Actions ──
function selectNote(id) {
  activeId = id;
  render();
  setTimeout(() => document.getElementById('editorContent').focus(), 50);
}

function createNote() {
  const note = { id: uid(), title: '', date: fmtDate(new Date()), ts: Date.now(), body: '' };
  notes.unshift(note);
  save();
  activeId = note.id;
  render();
  setTimeout(() => document.getElementById('editorTitle').focus(), 50);
}

function saveCurrentNote() {
  if (!activeId) return;
  const note = notes.find(n => n.id === activeId);
  if (!note) return;
  note.title = document.getElementById('editorTitle').value;
  note.body = document.getElementById('editorContent').value;
  note.date = fmtDate(new Date());
  note.ts = Date.now();
  document.getElementById('wordCount').textContent = wordCount(note.body) + ' words';
  document.getElementById('windowTitle').textContent = note.title || 'Untitled';
  save();
  // Refresh sidebar preview without resetting scroll
  const item = document.querySelector(`.note-item[data-id="${activeId}"]`);
  if (item) {
    const previewText = note.body.split('\n').find(l => l.trim()) || '';
    item.querySelector('.note-title').textContent = note.title || 'Untitled';
    item.querySelector('.note-preview').textContent = previewText.slice(0, 60);
  }
}

function filterNotes(q) {
  filterText = q;
  render();
}

// Delete with Cmd+Backspace or Cmd+Delete
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && (e.key === 'Backspace' || e.key === 'Delete')) {
    if (!activeId) return;
    if (document.activeElement === document.getElementById('editorTitle') ||
        document.activeElement === document.getElementById('editorContent')) return;
    deleteActive();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') {
    e.preventDefault();
    createNote();
  }
});

function deleteNote(id) {
  const idx = notes.findIndex(n => n.id === id);
  if (idx === -1) return;
  notes.splice(idx, 1);
  if (activeId === id) {
    const sorted = [...notes].sort((a,b) => b.ts - a.ts);
    activeId = sorted[0]?.id || null;
  }
  save();
  render();
}

function deleteActive() {
  if (activeId) deleteNote(activeId);
}

// ── Context menu ──
let ctxMenu = null;

function showContextMenu(x, y, noteId) {
  removeContextMenu();
  const menu = document.createElement('div');
  menu.className = 'ctx-menu';
  menu.innerHTML = `
    <div class="ctx-item" data-action="new">New Note</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" data-action="delete">Delete Note</div>
  `;
  menu.style.left = x + 'px';
  menu.style.top  = y + 'px';
  menu.querySelector('[data-action="new"]').addEventListener('click', () => { removeContextMenu(); createNote(); });
  menu.querySelector('[data-action="delete"]').addEventListener('click', () => { removeContextMenu(); deleteNote(noteId); });
  document.body.appendChild(menu);
  ctxMenu = menu;

  // Keep inside viewport
  const r = menu.getBoundingClientRect();
  if (r.right > window.innerWidth)  menu.style.left = (x - r.width) + 'px';
  if (r.bottom > window.innerHeight) menu.style.top = (y - r.height) + 'px';
}

function removeContextMenu() {
  if (ctxMenu) { ctxMenu.remove(); ctxMenu = null; }
}

document.addEventListener('click', removeContextMenu);
document.addEventListener('keydown', e => { if (e.key === 'Escape') removeContextMenu(); });



// ── No drag needed — fullscreen ──

// Init
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('newBtn').addEventListener('click', createNote);
  document.getElementById('searchInput').addEventListener('input', e => filterNotes(e.target.value));
  document.getElementById('editorTitle').addEventListener('input', saveCurrentNote);
  document.getElementById('editorContent').addEventListener('input', saveCurrentNote);
  render();
  if (notes.length > 0) selectNote([...notes].sort((a,b) => b.ts - a.ts)[0].id);
});
</script>
</body>
</html>
