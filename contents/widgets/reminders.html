<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reminders</title>

<script type="application/json" id="widgetMeta">
{
  "name": "Reminders",
  "version": "2.0",
  "author": "Korvo",
  "coverImage": "https://eblo.id/uploads/xIR0W7n/Screenshot%202026-04-02%20at%2017.45.05.opt.webp",
  "tags": ["Productivity", "Todo", "Tasks"],
  "description": "Classic Reminders widget with linen texture and ruled notepad aesthetic.",
  "releaseDate": "2026-04-01",
  "license": "MIT"

}
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: transparent;
}

.window {
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  border-radius: 6px;
  overflow: hidden;
  background-color: #e8e0d4;
  box-shadow: 0 2px 0 rgba(255,255,255,0.55) inset, 0 20px 60px rgba(0,0,0,0.55), 0 1px 3px rgba(0,0,0,0.4);
}

.titlebar {
  height: 38px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 0 10px;
  position: relative;
  background: linear-gradient(180deg, rgba(255,255,255,0.25), rgba(255,255,255,0.05));
  border-bottom: 1px solid rgba(140,120,100,0.35);
}

.title {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  font-size: 13px; font-weight: 500;
  color: #c0392b;
  text-shadow: 0 1px 0 rgba(255,255,255,0.6);
}

.btn-add {
  margin-left: auto;
  width: 22px; height: 22px;
  border-radius: 4px;
  border: 1px solid rgba(140,120,100,0.45);
  background: linear-gradient(180deg, rgba(255,255,255,0.5), rgba(200,185,165,0.4));
  color: #7a6a5a;
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  padding-bottom: 2px;
}
.btn-add:hover { background: rgba(255,255,255,0.6); }

.comp-bar {
  height: 28px; flex-shrink: 0;
  display: flex; align-items: center;
  padding: 0 10px 0 8px;
  border-bottom: 1px solid rgba(140,120,100,0.2);
  font-size: 12px; font-weight: 500; color: #7a6a5a;
}
.comp-badge {
  background: rgba(150,130,110,0.3);
  border-radius: 8px; padding: 0 6px;
  font-size: 11px; font-weight: 600;
  margin-right: 6px;
}

.task-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  background-image:
    linear-gradient(90deg, transparent 30px, #e8a0a0 30px, #e8a0a0 31px, transparent 31px),
    repeating-linear-gradient(180deg, transparent, transparent 27px, rgba(180,200,230,0.5) 27px, rgba(180,200,230,0.5) 28px);
  background-attachment: local;
}
.task-list::-webkit-scrollbar { width: 5px; }
.task-list::-webkit-scrollbar-thumb { background: rgba(140,120,100,0.3); border-radius: 3px; }

.task-row {
  display: flex;
  align-items: center;
  min-height: 28px;
  padding: 4px 8px 4px 6px;
  position: relative;
}
.task-row:hover { background: rgba(200,185,165,0.2); }
.task-row:hover .del-btn { opacity: 1; }

.chk {
  width: 18px; height: 18px; flex-shrink: 0;
  border-radius: 3px;
  border: 1.5px solid rgba(140,120,100,0.5);
  background: linear-gradient(180deg, rgba(255,255,255,0.7), rgba(230,215,195,0.5));
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  margin-right: 10px;
}
.chk.on {
  background: linear-gradient(180deg, #3a3a3a, #1a1a1a);
  border-color: #111;
}
.chk.on::after {
  content: '';
  display: block;
  width: 9px; height: 5px;
  border-left: 1.5px solid #fff;
  border-bottom: 1.5px solid #fff;
  transform: rotate(-45deg) translateY(-1px);
}

.task-text {
  flex: 1;
  font-size: 13px;
  color: #3a2a1a;
  outline: none;
  line-height: 1.5;
  word-break: break-word;
  text-shadow: 0 1px 0 rgba(255,255,255,0.5);
  padding-left: 6px;
}
.task-text.done { text-decoration: line-through; }

.task-sub { font-size: 11px; color: #c0392b; margin-top: 1px; }

.del-btn {
  opacity: 0;
  width: 16px; height: 16px; flex-shrink: 0;
  border-radius: 50%; border: none;
  background: rgba(140,120,100,0.35);
  color: #7a6a5a;
  font-size: 14px; line-height: 1;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  margin-left: 4px;
}
.del-btn:hover { background: rgba(200,60,50,0.6); color: #fff; }
.input-row {
  display: flex;
  align-items: center;
  min-height: 28px;
  padding: 4px 8px 4px 6px;
  background: rgba(255,255,255,0.18);
}
.add-input {
  flex: 1;
  border: none; background: transparent;
  font-size: 13px; color: #3a2a1a;
  font-family: inherit;
  outline: none;
  padding-left: 6px;
  margin-left: 10px;
}
.add-input::placeholder { color: #aaa; }

</style>
</head>
<body>
<div class="window">

  <div class="titlebar">
    <span class="title">Reminders</span>
    <button class="btn-add" id="btnAdd">+</button>
  </div>

  <div class="comp-bar">
    <span class="comp-badge" id="compCount">0</span> Completed
  </div>

  <div class="task-list" id="taskList"></div>



</div>
<script>
var taskList  = document.getElementById('taskList');
var btnAdd    = document.getElementById('btnAdd');
var compCount = document.getElementById('compCount');

function countDone() {
  compCount.textContent = taskList.querySelectorAll('.chk.on').length;
}

// Build a blank checkbox icon for the input row
function makeEmptyChk() {
  var chk = document.createElement('div');
  chk.className = 'chk';
  chk.style.opacity = '0.4';
  chk.style.cursor = 'default';
  return chk;
}

// The inline input row — inserted before checked tasks
var inputRow = document.createElement('div');
inputRow.className = 'input-row';
inputRow.style.display = 'none';

var inputChk = makeEmptyChk();
var addInput = document.createElement('input');
addInput.className = 'add-input';
addInput.placeholder = 'New reminder…';
addInput.type = 'text';

inputRow.appendChild(inputChk);
inputRow.appendChild(addInput);

function showInputRow() {
  // Insert before first checked row, or at end
  var rows = taskList.querySelectorAll('.task-row');
  var insertBefore = null;
  for (var i = 0; i < rows.length; i++) {
    if (rows[i].querySelector('.chk.on')) { insertBefore = rows[i]; break; }
  }
  if (insertBefore) {
    taskList.insertBefore(inputRow, insertBefore);
  } else {
    taskList.appendChild(inputRow);
  }
  inputRow.style.display = 'flex';
  addInput.value = '';
  addInput.focus();
}

function hideInputRow() {
  inputRow.style.display = 'none';
  addInput.value = '';
}

function makeRow(text, sub) {
  var row = document.createElement('div');
  row.className = 'task-row';

  var chk = document.createElement('div');
  chk.className = 'chk';
  chk.onclick = function() {
    var on = chk.classList.toggle('on');
    label.className = on ? 'task-text done' : 'task-text';
    countDone();
    // auto-sort: move completed to bottom, uncompleted to top
    var rows = Array.from(taskList.querySelectorAll('.task-row'));
    rows.forEach(function(r) { taskList.removeChild(r); });
    var active = rows.filter(function(r) { return !r.querySelector('.chk.on'); });
    var done   = rows.filter(function(r) { return  r.querySelector('.chk.on'); });
    active.concat(done).forEach(function(r) { taskList.appendChild(r); });
    // re-insert input row at correct position if visible
    if (inputRow.style.display !== 'none') {
      var firstDone = taskList.querySelector('.task-row .chk.on');
      if (firstDone) taskList.insertBefore(inputRow, firstDone.closest('.task-row'));
      else taskList.appendChild(inputRow);
    }
  };

  var labelWrap = document.createElement('div');
  labelWrap.style.cssText = 'flex:1;min-width:0;';

  var label = document.createElement('div');
  label.className = 'task-text';
  label.contentEditable = 'true';
  label.textContent = text;
  label.onkeydown = function(e) {
    if (e.key === 'Enter') { e.preventDefault(); label.blur(); }
  };
  label.onblur = function() {
    if (!label.textContent.trim()) { row.remove(); countDone(); }
  };
  labelWrap.appendChild(label);

  if (sub) {
    var subEl = document.createElement('div');
    subEl.className = 'task-sub';
    subEl.textContent = sub;
    labelWrap.appendChild(subEl);
  }

  var del = document.createElement('button');
  del.className = 'del-btn';
  del.textContent = '×';
  del.onmousedown = function(e) { e.preventDefault(); };
  del.onclick = function() { row.remove(); countDone(); };

  row.appendChild(chk);
  row.appendChild(labelWrap);
  row.appendChild(del);
  return row;
}

countDone();

btnAdd.onclick = function() {
  if (inputRow.style.display === 'none') {
    showInputRow();
  } else {
    hideInputRow();
  }
};

addInput.onkeydown = function(e) {
  if (e.key === 'Escape') {
    hideInputRow();
    return;
  }
  if (e.key === 'Enter') {
    e.preventDefault();
    var val = addInput.value.trim();
    if (val !== '') {
      var newRow = makeRow(val, '');
      taskList.insertBefore(newRow, inputRow);
      addInput.value = '';
      countDone();
    }
  }
};

addInput.onblur = function() {
  setTimeout(function() {
    if (document.activeElement !== addInput && addInput.value.trim() === '') {
      hideInputRow();
    }
  }, 200);
};
</script>
</body>
</html>
